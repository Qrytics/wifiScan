name: Deploy Admin Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  enable-pages:
    name: Enable GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      administration: write
    steps:
      - name: Enable GitHub Pages via API
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const response = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              // Pages already enabled; ensure it uses the workflow (Actions) source
              if (response.data.build_type !== 'workflow') {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  build_type: 'workflow',
                });
                console.log('Updated GitHub Pages source to GitHub Actions');
              } else {
                console.log('GitHub Pages already configured with GitHub Actions source');
              }
            } catch (error) {
              if (error.status === 404) {
                // Pages not yet enabled — create it
                await github.rest.repos.createPagesSite({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  build_type: 'workflow',
                });
                console.log('GitHub Pages enabled with GitHub Actions source');
              } else {
                throw error;
              }
            }

  build:
    name: Build Admin Dashboard
    runs-on: ubuntu-latest
    needs: enable-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: admin
        env:
          VITE_BASE_PATH: /wifiScan/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: admin/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
